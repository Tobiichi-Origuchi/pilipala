name: Pilipala Auto Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.env_setup.outputs.short_sha }}
      release_type: ${{ steps.env_setup.outputs.release_type }}
      release_name: ${{ steps.env_setup.outputs.release_name }}
      is_prerelease: ${{ steps.env_setup.outputs.is_prerelease }}
    steps:
      - name: 代码迁出
        uses: actions/checkout@v4
      - name: 环境路由分发
        id: env_setup
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "当前是版本构建: $TAG_NAME"
            BUILD_NAME=${TAG_NAME#v}
            if [[ $TAG_NAME == *-beta* ]]; then
              echo "release_type=beta" >> $GITHUB_OUTPUT
              echo "release_name=$TAG_NAME 预览版本" >> $GITHUB_OUTPUT
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "release_type=release" >> $GITHUB_OUTPUT
              echo "release_name=$TAG_NAME 正式版本" >> $GITHUB_OUTPUT
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "当前是滚动构建: $SHORT_SHA"
            BASE_VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //g' | cut -d '+' -f 1 | cut -d '-' -f 1)
            BUILD_NAME="${BASE_VERSION}-rolling.${SHORT_SHA}"
            echo "release_type=rolling" >> $GITHUB_OUTPUT
            echo "release_name=Rolling-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi
          FULL_VERSION="${BUILD_NAME}+${BUILD_NUMBER}"
          sed -i "s/^version: .*/version: $FULL_VERSION/g" pubspec.yaml
          grep '^version: ' pubspec.yaml

      - name: 构建Java环境
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 检查缓存
        uses: actions/cache@v3
        id: cache-flutter
        with:
          path: /root/flutter-sdk
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: 安装Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable

      - name: 下载项目依赖
        run: flutter pub get

      - name: 解码生成 jks
        run: echo $KEYSTORE_BASE64 | base64 -di > android/app/vvex.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Flutter Build APK (Split)
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD}}

      - name: Flutter Build APK (Universal)
        run: flutter build apk --release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD}}

      - name: 重命名应用
        run: |
          TYPE=${{ steps.env_setup.outputs.release_type }}
          for file in build/app/outputs/flutter-apk/app-*.apk; do
            if [[ $file =~ app-(.*)-release\.apk ]]; then
              arch="${BASH_REMATCH[1]}"
              mv "$file" "build/app/outputs/flutter-apk/PiliPala-${TYPE}-${arch}.apk"
            elif [[ $file == *"app-release.apk" ]]; then
              mv "$file" "build/app/outputs/flutter-apk/PiliPala-${TYPE}-universal.apk"
            fi
          done

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Pilipala-Rolling-Artifacts
          path: build/app/outputs/flutter-apk/PiliPala-*.apk
          retention-days: 3

  upload_release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          name: Pilipala-Rolling-Artifacts
          path: ./Release-Files

      - name: 发布版本
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ needs.build.outputs.release_name }}
          body: |
            版本发布
            * 构建类型: **${{ needs.build.outputs.release_type }}**
            * 触发分支/Tag: `${{ github.ref_name }}`
            * 最新提交: `${{ github.sha }}`
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          replacesArtifacts: true
          artifacts: "Release-Files/*"
